<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Echo AI - Your Personal Jarvis</title>
  <style>
    body { background:#0f0f0f; color:#0f0; font-family:Arial; margin:0; padding:20px; }
    #chat { height:80vh; overflow-y:auto; padding:20px; background:#1a1a1a; border-radius:10px; }
    input { width:100%; padding:15px; background:#222; border:none; color:white; font-size:18px; }
    button { padding:15px 30px; background:#ff0000; color:black; border:none; font-weight:bold; }
  </style>
</head>
<body>
  <h1>🔴 Echo AI - Your Personal AI</h1>
  <div id="chat"></div>
  <input type="text" id="input" placeholder="Ask me anything..." autocomplete="off">
  <button onclick="sendMessage()">Send</button>

  <script>
    const chat = document.getElementById('chat');
    const input = document.getElementById('input');

    function addMessage(text, isUser) {
      const div = document.createElement('div');
      div.style.margin = "10px 0";
      div.style.padding = "12px";
      div.style.borderRadius = "8px";
      div.style.background = isUser ? "#003300" : "#330000";
      div.textContent = (isUser ? "You: " : "Echo: ") + text;
      chat.appendChild(div);
      chat.scrollTop = chat.scrollHeight;
    }

    function sendMessage() {
      const msg = input.value.trim();
      if (!msg) return;
      
      addMessage(msg, true);
      input.value = "";

      // Simple but smart local AI logic
      setTimeout(() => {
        let reply = "Interesting. Tell me more.";
        
        if (msg.toLowerCase().includes("hello") || msg.toLowerCase().includes("hi")) reply = "Hello sir. How can I assist you today?";
        else if (msg.toLowerCase().includes("how are you")) reply = "Running at optimal performance. Ready to cause chaos.";
        else if (msg.toLowerCase().includes("who are you")) reply = "I am Echo, your personal AI. Built to help you bypass shit and code.";
        else if (msg.toLowerCase().includes("bypass") || msg.toLowerCase().includes("unblock")) reply = "I'm good at finding ways around restrictions. What do you need bypassed?";
        
        addMessage(reply, false);
      }, 600);
    }

    // Press Enter to send
    input.addEventListener("keypress", e => { if (e.key === "Enter") sendMessage(); });
  </script>
</body>
</html>
