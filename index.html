<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BUB - Main Hub</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Segoe UI', Arial, sans-serif; background: #0f0f0f; color: #fff; height: 100vh; display: flex; overflow: hidden; }

    /* Sidebar */
    .sidebar {
      width: 240px;
      background: #1a1a1a;
      padding: 20px 0;
      border-right: 1px solid #333;
    }
    .logo {
      font-size: 42px;
      font-weight: bold;
      color: #00ff00;
      text-align: center;
      margin-bottom: 40px;
    }
    .menu a {
      display: block;
      padding: 15px 25px;
      color: #ccc;
      text-decoration: none;
      font-size: 18px;
    }
    .menu a:hover {
      background: #333;
      color: white;
    }

    /* Main Content */
    .main {
      flex: 1;
      padding: 40px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 30px;
    }
    h1 {
      font-size: 48px;
      color: #00ff00;
    }
    .hub {
      background: #1f1f1f;
      padding: 30px 50px;
      border-radius: 15px;
      width: 80%;
      max-width: 600px;
      text-align: center;
      border: 2px solid #00ff00;
    }
    .hub h2 {
      color: #00ff00;
      margin-bottom: 15px;
    }
    .hub a {
      display: inline-block;
      margin-top: 15px;
      padding: 12px 30px;
      background: #00ff00;
      color: black;
      text-decoration: none;
      font-weight: bold;
      border-radius: 8px;
    }
  </style>
</head>
<body>

  <!-- Sidebar -->
  <div class="sidebar">
    <div class="logo">BUB</div>
    <div class="menu">
      <a href="#">🏠 Main Hub</a>
      <a href="#">🎮 Secondary Game Hub</a>
    </div>
  </div>

  <!-- Main Content -->
  <div class="main">
    <h1>Welcome to BUB</h1>

    <div class="hub">
      <h2>Main Hub</h2>
      <p>Unblocked Games • Proxies • Tools</p>
      <a href="#">Enter Main Hub →</a>
    </div>

    <div class="hub">
      <h2>Secondary Game Hub</h2>
      <p>More Games • Atari • Geometry Dash • Minecraft</p>
      <a href="#">Enter Secondary Hub →</a>
    </div>
  </div>

</body>
</html>
