<!DOCTYPE html>

<head>

  <title>BUB</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Segoe UI', sans-serif; background: #0f0f0f; color: white; height: 100vh; display: flex; overflow: hidden; }

    .hub { background: #1f1f1f; padding: 35px 60px; border-radius: 15px; width: 85%; max-width: 650px; text-align: center; border: 3px solid #ff0000; box-shadow: 0 0 25px #ff0000; }
    .hub:hover { transform: scale(1.05); }
    .hub h2 { color: #ff0000; margin-bottom: 15px; font-size: 32px; }
    .hub a { display: inline-block; margin-top: 20px; padding: 16px 50px; background: #ff0000; color: black; text-decoration: none; font-weight: bold; font-size: 20px; border-radius: 10px; }
